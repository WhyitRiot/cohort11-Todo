services:
  postgres-db:
    container_name: todo
    image: postgres # use latest official postgres version
    restart: always
    volumes:
      - ./postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: todo
      POSTGRES_HOST_AUTH_METHOD: password
    ports:
      - "5433:5432"

volumes:
  postgresql_data:
    driver: local
